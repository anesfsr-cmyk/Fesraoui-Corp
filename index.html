<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fesraoui Corp</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050816;
color:white;
display:flex;
min-height:100vh;
}

.sidebar{
width:250px;
background:#0b1120;
padding:20px;
}

.logo{
font-size:24px;
font-weight:bold;
margin-bottom:30px;
}

.menu div{
padding:12px;
margin-bottom:10px;
background:#111827;
border-radius:10px;
}

.content{
flex:1;
padding:30px;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
}

.value{
font-size:30px;
color:#6d5dfe;
margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">Fesraoui Corp</div>

<div class="menu">
<div>🏠 Tableau de bord</div>
<div>📈 Revenus</div>
<div>👥 Utilisateurs</div>
<div>📦 Produits</div>
<div>📄 Rapports</div>
</div>
</div>

<div class="content">

<h1>Bonjour, Fesraoui Anes 👋</h1>

<div class="cards">

<div class="card">
<div>Revenu du mois</div>
<div class="value">€12,450</div>
</div>

<div class="card">
<div>Semaine</div>
<div class="value">€2,880</div>
</div>

<div class="card">
<div>Aujourd'hui</div>
<div class="value">€420</div>
</div>

<div class="card">
<div>Utilisateurs</div>
<div class="value">1,240</div>
</div>

</div>

</div>

</body>
</html>
